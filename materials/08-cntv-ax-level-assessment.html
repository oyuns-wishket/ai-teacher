<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>보호된 문서 — CNTV+ AX JOURNEY</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F9FB;--ink:#12161F;--ink2:#2A3140;--muted:#5C6470;--faint:#8B93A1;
  --line:#E5E8EE;--card:#FFFFFF;--orange:#F97316;--orange-d:#EA580C;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --grad:linear-gradient(90deg,#F59E0B,#F97316);
  --shadow:0 2px 6px rgba(18,22,31,.06),0 14px 34px rgba(18,22,31,.09);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;
  display:grid;place-items:center;padding:24px;
  -webkit-font-smoothing:antialiased;
}
.gate{
  width:100%;max-width:420px;background:var(--card);
  border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
  padding:40px 36px 34px;text-align:center;position:relative;overflow:hidden;
}
.gate::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--grad)}
.lock{
  width:56px;height:56px;border-radius:50%;margin:0 auto 18px;
  background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(249,115,22,.12));
  border:1.5px solid rgba(249,115,22,.3);display:grid;place-items:center;
}
.kick{
  font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.16em;
  color:var(--orange-d);text-transform:uppercase;margin-bottom:8px;
}
h1{font-size:21px;font-weight:900;letter-spacing:-.02em;margin-bottom:6px}
.sub{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:24px}
form{display:grid;gap:10px}
input[type=password]{
  width:100%;padding:13px 16px;font-size:15px;font-weight:600;
  font-family:var(--mono);letter-spacing:.04em;text-align:center;
  border:1.5px solid var(--line);border-radius:12px;background:#FBFCFD;color:var(--ink);
  outline:none;transition:border-color .2s, box-shadow .2s;
}
input[type=password]:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.12)}
button{
  width:100%;padding:13px 16px;font-size:14.5px;font-weight:800;letter-spacing:-.01em;
  font-family:inherit;color:#fff;background:var(--grad);
  border:none;border-radius:12px;cursor:pointer;transition:transform .15s, box-shadow .2s;
}
button:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(249,115,22,.3)}
button:disabled{opacity:.55;cursor:wait;transform:none;box-shadow:none}
.err{
  font-size:12.5px;font-weight:700;color:#DC2626;min-height:18px;margin-top:2px;
  opacity:0;transition:opacity .2s;
}
.err.show{opacity:1}
.gate.shake{animation:shake .4s}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-8px)}
  40%,80%{transform:translateX(8px)}
}
.foot{margin-top:22px;font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.06em}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="lock">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#EA580C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="11" width="16" height="10" rx="2.5"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    </svg>
  </div>
  <div class="kick">CNTV+ AX JOURNEY · Restricted</div>
  <h1>보호된 문서</h1>
  <p class="sub">이 문서는 열람 권한이 있는 사람에게만 공유됩니다.<br>전달받은 비밀번호를 입력하세요.</p>
  <form id="f" autocomplete="off">
    <input type="password" id="pw" placeholder="비밀번호" autofocus autocomplete="current-password">
    <button type="submit" id="btn">열기</button>
    <p class="err" id="err">비밀번호가 올바르지 않습니다.</p>
  </form>
  <p class="foot">AES-256 ENCRYPTED · SESSION AUTH</p>
</div>

<script>
(function(){
  var P = JSON.parse(document.getElementById('enc').textContent);
  var SKEY = 'ax-doc-key:' + location.pathname;

  function b64(s){
    var bin = atob(s), a = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) a[i] = bin.charCodeAt(i);
    return a;
  }

  async function decrypt(pw){
    var enc = new TextEncoder();
    var km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64(P.s), iterations:P.it, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']
    );
    var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(P.i)}, key, b64(P.d));
    return new TextDecoder().decode(pt);
  }

  function show(html){
    document.open();
    document.write(html);
    document.close();
  }

  async function attempt(pw, silent){
    try{
      var html = await decrypt(pw);
      try{ sessionStorage.setItem(SKEY, pw); }catch(e){}
      show(html);
      return true;
    }catch(e){
      if(!silent){
        var g = document.getElementById('gate');
        document.getElementById('err').classList.add('show');
        g.classList.remove('shake'); void g.offsetWidth; g.classList.add('shake');
      }
      return false;
    }
  }

  /* session auto-unlock */
  var saved = null;
  try{ saved = sessionStorage.getItem(SKEY); }catch(e){}
  if(saved){ attempt(saved, true); }

  document.getElementById('f').addEventListener('submit', async function(ev){
    ev.preventDefault();
    var btn = document.getElementById('btn');
    var pw = document.getElementById('pw').value;
    if(!pw) return;
    btn.disabled = true; btn.textContent = '확인 중…';
    document.getElementById('err').classList.remove('show');
    var ok = await attempt(pw, false);
    if(!ok){ btn.disabled = false; btn.textContent = '열기'; document.getElementById('pw').select(); }
  });
})();
</script>
